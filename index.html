const RATING_LABELS = {1:'😞 גרוע', 2:'😐 בינוני', 3:'🙂 סביר', 4:'😊 טוב', 5:'🤩 מצוין!'};
let currentStars = 0;

function selectStar(n) {
  currentStars = n;
  updateStarDisplay(n);
  document.getElementById('rating-label').textContent = RATING_LABELS[n] || '';
}
function hoverStar(n)  { updateStarDisplay(n); }
function resetStars()  { updateStarDisplay(currentStars); }
function updateStarDisplay(n) {
  [1,2,3,4,5].forEach(i => {
    const el = document.getElementById('star-'+i);
    if(el) el.style.opacity = i<=n ? '1' : '0.3';

async function submitRating(shipmentId, driverId, btn) {

  const { error } = await sb.from('reviews').insert({
    shipment_id:  shipmentId,
    reviewer_id:  currentUser.id,
    reviewed_id:  driverId,
    rating:       currentStars,
    comment:      comment,
  });

  if (error) {
    // טבלה לא קיימת – הצג הצלחה מדומה
    console.log('reviews table not set up yet');
  }

  btn.closest('[style*=fixed]').remove();
  showToast(`✅ הדירוג נשלח – ${RATING_LABELS[currentStars]}`);
  currentStars = 0;
}

          style="width:100%;padding:11px 13px;background:var(--card);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:15px;outline:none;font-family:monospace;letter-spacing:2px">
      </div>
      <div style="display:flex;gap:10px;margin-bottom:20px">
        <div style="flex:1">
          <div style="font-size:12px;color:var(--light);margin-bottom:5px">תוקף</div>
          <input placeholder="MM/YY" maxlength="5"
            style="width:100%;padding:11px 13px;background:var(--card);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:14px;outline:none;font-family:monospace;text-align:center">
        </div>
        <div style="flex:1">
          <div style="font-size:12px;color:var(--light);margin-bottom:5px">CVV</div>
          <input placeholder="•••" maxlength="3" type="password"
            style="width:100%;padding:11px 13px;background:var(--card);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:14px;outline:none;font-family:monospace;text-align:center">
        </div>
      </div>

      <button onclick="processPayment(${amount},${commission},'${driverName}',this)"
        style="width:100%;background:var(--green);border:none;color:var(--black);border-radius:12px;padding:14px;font-family:inherit;font-weight:800;font-size:15px;cursor:pointer;box-shadow:0 4px 20px rgba(34,197,94,.4)">
        🔒 שלם ₪${amount} בצורה מאובטחת
      </button>
      <div style="text-align:center;font-size:11px;color:var(--muted);margin-top:10px">
        🔒 מאובטח על ידי Cardcom · SSL 256-bit
      </div>
    </div>`;
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };
  document.body.appendChild(overlay);
}

async function processPayment(amount, commission, driverName, btn) {
  btn.textContent = '⏳ מעבד תשלום...'; btn.disabled = true;

  // סימולציה של עיבוד תשלום (בפרודקשן – Cardcom API)
  await new Promise(r => setTimeout(r, 2000));

  btn.closest('[style*=fixed]').innerHTML = `
    <div style="text-align:center;padding:20px">
      <div style="font-size:56px;margin-bottom:12px">✅</div>
      <div style="font-weight:800;font-size:22px;margin-bottom:8px">תשלום הושלם!</div>
      <div style="color:var(--muted);font-size:13px;margin-bottom:6px">₪${amount} שולם בהצלחה</div>
      <div style="color:var(--green);font-size:13px;margin-bottom:20px">₪${amount-commission} יועבר ל${driverName}</div>
      <div style="background:rgba(245,166,35,.08);border-radius:10px;padding:12px;font-size:12px;color:var(--muted);margin-bottom:20px">
        💡 בפרודקשן: מחובר ל-Cardcom API לחיוב אמיתי ו-Escrow אוטומטי
      </div>
      <button onclick="this.closest('[style*=fixed]').remove()"
        style="background:var(--accent);border:none;color:var(--black);border-radius:10px;padding:12px 28px;cursor:pointer;font-family:inherit;font-weight:800">סגור</button>
    </div>`;
}

// ── הוסף כפתורי צ'אט ודירוג לכרטיסי הובלה של עסק ──
const _origRenderBList = renderBList;
window.renderBList = function() {
  _origRenderBList();
  // הוסף כפתורי פעולה לכרטיסים שהושלמו
  BUSINESS_SHIPMENTS.forEach(s => {
    if (s.status === 'accepted' || s.status === 'done') {
      const cards = document.querySelectorAll('#b-list > div');
      cards.forEach(card => {
        if (card.textContent.includes(s.title || s.from) && !card.querySelector('.extra-actions')) {
          const actions = document.createElement('div');
          actions.className = 'extra-actions';
          actions.style.cssText = 'display:flex;gap:6px;margin-top:8px';
          actions.innerHTML = `
            <button onclick="openChat('${s.id}','${s.acceptedDriverName||'נהג'}')" data-chat-shipment="${s.id}"
              style="flex:1;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:#93c5fd;border-radius:7px;padding:6px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600">
              💬 צ'אט עם הנהג
            </button>
            ${s.status === 'delivered' && s.acceptedDriverId ? `
            <button onclick="openRatingModal('${s.id}','${(s.acceptedDriverName||'הנהג').replace(/'/g,"\\'")}','${s.acceptedDriverId}')"
              style="flex:1;background:linear-gradient(135deg,rgba(245,166,35,.2),rgba(245,166,35,.1));border:1px solid rgba(245,166,35,.5);color:var(--accent);border-radius:7px;padding:6px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700">
              ⭐ דרג את ${s.acceptedDriverName||'הנהג'}
            </button>` : ''}
            <button onclick="openPaymentModal('${s.id}',${s.price},'הנהג')"
              style="flex:1;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#86efac;border-radius:7px;padding:6px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600">
              💳 שלם
            </button>`;
          card.appendChild(actions);
        }
      });
    }
  });
};

// Add notification button to topbar after init
// ── Add user icon to topbar ───────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const topbar = document.getElementById('topbar');
  if (topbar) {
    const userBtn = document.createElement('button');
    userBtn.onclick = showUserMenu;
    userBtn.style.cssText = 'background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 12px;cursor:pointer;font-family:inherit;font-size:12px;display:flex;align-items:center;gap:6px;max-width:200px';
    userBtn.innerHTML = '👤 <span id="user-name-btn" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">כניסה</span>';
    topbar.appendChild(userBtn);
    updateUserBtn();
  }
});

// ── INIT ─────────────────────────────────────────────────────
initAuth().then(() => {
  subscribeRealtime();
  loadShipmentsFromDB();
  addNotificationBtn();
  requestNotificationPermission();
});
</script>
</body>
</html>
